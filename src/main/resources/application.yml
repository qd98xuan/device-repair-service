    username: root
    password: JYhuang981125

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: now()
      logic-not-delete-value: '0'
  mapper-locations: classpath*:/mapper/**/*.xml

# Swagger/OpenAPI配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    tryItOutEnabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

# MCP服务配置
mcp:
  auth:
    # MCP服务认证Token，请通过环境变量或启动参数注入，例如 MCP_AUTH_TOKEN
    token: ${MCP_AUTH_TOKEN:}
  server:
    name: ${MCP_SERVER_NAME:device-repair-mcp-server}
    version: ${MCP_SERVER_VERSION:1.0.0}

# 日志配置
logging:
  level:
    com.example.repair: debug
